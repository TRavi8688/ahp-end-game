apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: hospyn-core-routing
  namespace: hospyn-prod
spec:
  hosts:
  - "api.hospyn.com"
  gateways:
  - hospyn-gateway
  http:
  # 1. Microservice Extraction: Route Auth traffic to IAM Service
  - match:
    - uri:
        prefix: /api/v1/auth
    route:
    - destination:
        host: iam-service.hospyn-prod.svc.cluster.local
        port:
          number: 80

  # 2. Microservice Extraction: Route Billing webhooks to Billing Service
  - match:
    - uri:
        prefix: /api/v1/webhooks/stripe
    route:
    - destination:
        host: billing-service.hospyn-prod.svc.cluster.local
        port:
          number: 80

  # 3. Fallback: Everything else hits the Modular Monolith
  - route:
    - destination:
        host: core-monolith.hospyn-prod.svc.cluster.local
        port:
          number: 80

---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: hospyn-prod
spec:
  # 4. Global Scale Security: Enforce strict mTLS across all microservices
  mtls:
    mode: STRICT
