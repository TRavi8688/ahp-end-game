# nginx/nginx.conf  (root level — mounted into nginx container)
#
# WHAT CHANGED vs existing nginx.conf:
#  - FIX-N1: Added /api/v1/admin/ route (super-admin dashboard was 100% dead)
#  - FIX-N2: Added /api/v1/partner/ route (partner app was 100% dead)
#  - FIX-N3: Added /api/v1/staff/ route (HR portal was 100% dead)
#  - FIX-N4: Added /api/v1/ws/ WebSocket upgrade block
#  - FIX-N5: AI route gets longer timeout (120s for LLM calls)
#  - Rate limiting zones added for each endpoint class
#  - HTTP → HTTPS redirect at port 80

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time rid=$request_id';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    server_tokens off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_rl:10m    rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_rl:10m     rate=100r/s;
    limit_req_zone $binary_remote_addr zone=admin_rl:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=partner_rl:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=ws_rl:10m      rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_rl:10m;
    limit_req_status 429;

    # ── Upstream gateway ─────────────────────────────────────────────────────
    upstream gateway {
        server gateway:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # ── HTTP → HTTPS ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name ${NGINX_HOST:-app.hospyn.com};

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                            always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-XSS-Protection          "1; mode=block"                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-Request-ID              $request_id                       always;

        limit_conn conn_rl 20;

        # ── Health (nginx self — no upstream) ─────────────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","service":"nginx"}';
        }

        # ── FIX-N4: WebSocket for real-time queue + clinical alerts ───────────
        # Used by: patient-app, doctor-app, staff-portal
        location /api/v1/ws/ {
            limit_req zone=ws_rl burst=20 nodelay;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Auth — strict rate limit ──────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_rl burst=10 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── FIX-N1: Super Admin routes ────────────────────────────────────────
        # super-admin-dashboard calls /api/v1/admin/analytics/overview,
        # /api/v1/admin/hospitals, /api/v1/admin/users, /api/v1/admin/audit-logs
        # WITHOUT this block: 100% of super-admin API calls returned nginx 404.
        location /api/v1/admin/ {
            limit_req zone=admin_rl burst=50 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── FIX-N2: Partner App routes ────────────────────────────────────────
        # partner-app calls /api/v1/partner/auth/login, /api/v1/partner/inventory
        # /api/v1/partner/orders, /api/v1/partner/referrals
        # WITHOUT this block: entire partner app returned nginx 404.
        location /api/v1/partner/ {
            limit_req zone=partner_rl burst=100 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── FIX-N3: HR Portal staff routes ────────────────────────────────────
        # hr-portal calls /api/v1/staff/list, /api/v1/staff/shifts, /api/v1/staff/leaves
        # WITHOUT this block: all HR portal data returned nginx 404.
        location /api/v1/staff/ {
            limit_req zone=api_rl burst=100 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── Support Tickets ───────────────────────────────────────────────────
        location /api/v1/tickets/ {
            limit_req zone=api_rl burst=50 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── FIX-N5: AI routes — 120s timeout for LLM calls ───────────────────
        location /api/v1/ai/ {
            limit_req zone=api_rl burst=20 nodelay;
            proxy_read_timeout 120s;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── Notification service ──────────────────────────────────────────────
        location /api/v1/notifications/ {
            limit_req zone=api_rl burst=100 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
        }

        # ── All other /api/v1/ routes (clinical) ─────────────────────────────
        location /api/v1/ {
            limit_req zone=api_rl burst=200 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Connection "";
            proxy_request_buffering off;
        }

        # ── Static frontend assets ────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Rate limit error page ─────────────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            add_header Content-Type application/json always;
            add_header Retry-After 1 always;
            return 429 '{"error":"Too many requests","retry_after":1}';
        }

        # Block attack paths
        location ~* \.(php|asp|aspx|jsp|cgi)$ { return 404; }
        location ~ /\.                          { deny all; }
    }
}
