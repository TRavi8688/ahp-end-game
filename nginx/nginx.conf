# nginx/nginx.conf
#
# FIXES:
#   BUG-1: Removed "upstream gateway" pointing to non-existent service.
#          Nginx now routes directly to each microservice.
#   PERF-3: worker_processes auto, worker_connections 4096, epoll, multi_accept.
#   PERF-4: keepalive tuned for high concurrency.
#   SEC-4: HTTP-only config — TLS must be terminated at the Cloud Load Balancer
#          in front of this (GCP HTTPS LB with managed cert). Nginx handles
#          internal HTTP between LB and services inside the private network.
#   WebSocket: Routes /ws/... correctly to healthcare-core.
#   Health:    Per-service health endpoints exposed.
#
# Traffic flow (production on Cloud Run):
#   Internet → GCP HTTPS Load Balancer (TLS termination)
#            → Cloud Run: nginx container (port 8000)
#                   → auth-service:8001
#                   → healthcare-core:8002
#                   → ai-service:8003
#                   → notification-service:8004

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration_ms":$request_time,'
            '"upstream_duration_ms":"$upstream_response_time",'
            '"client":"$remote_addr",'
            '"x_request_id":"$http_x_request_id",'
            '"upstream":"$upstream_addr"'
        '}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 10000;

    # Buffers — tune to avoid disk spills for typical API responses
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip             on;
    gzip_comp_level  4;
    gzip_min_length  1024;
    gzip_types       text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Zone sizes: 10m ≈ 160,000 IP entries
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m     rate=10r/s;

    limit_req_status 429;

    # ── Upstreams — direct to each service (no gateway hop) ──────────────────
    # FIX BUG-1: removed "upstream gateway { server gateway:8000; }" —
    # "gateway" service does not exist. Each service gets its own upstream block.

    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }

    upstream healthcare_core {
        server healthcare-core:8002;
        keepalive 64;
    }

    upstream ai_service {
        server ai-service:8003;
        keepalive 16;
    }

    upstream notification_service {
        server notification-service:8004;
        keepalive 16;
    }

    # ── Common proxy headers (shared across locations) ────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
    proxy_set_header Connection        "";

    # Timeouts
    proxy_connect_timeout  5s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 8000;
        server_name _;

        # Security headers (complement TLS headers added by GCP LB)
        add_header X-Frame-Options          "DENY"                            always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=()"   always;

        # Hide nginx version
        server_tokens off;

        # Block requests with no Host header
        if ($host = "") { return 400; }

        # ── Nginx self health (no upstream call) ──────────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","service":"nginx"}';
        }

        # ── WebSocket — healthcare-core real-time queue + clinical alerts ─────
        # FIX ARCH-5: was routed to non-existent "gateway"
        location /ws/ {
            limit_req zone=ws_limit burst=20 nodelay;

            proxy_pass http://healthcare_core;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Auth service — strict rate limit ──────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10;
            proxy_pass http://auth_service;
        }

        # ── Healthcare core — main clinical API ───────────────────────────────
        location /api/v1/healthcare/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass http://healthcare_core;
        }

        # ── Patient-app short-form routes (no /healthcare/ prefix) ────────────
        # Patient mobile app calls /api/v1/patient/* and /api/v1/profile/* directly.
        # nginx rewrites them to the same healthcare-core service so the backend
        # sees /api/v1/healthcare/patient/... as if the full prefix were included.
        # CRITICAL: these must come BEFORE the default location / block.
        location /api/v1/patient/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/patient/(.*)$ /api/v1/healthcare/patient/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/profile/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/v1/profile/(.*)$ /api/v1/healthcare/profile/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/billing/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/v1/billing/(.*)$ /api/v1/healthcare/billing/$1 break;
            proxy_pass http://healthcare_core;
        }

        # BUG FIX: the patient app also calls these short forms directly
        # (no /healthcare/ prefix) for patients/me, appointments, doctor
        # search, clinical timeline & prescriptions, support tickets,
        # walk-in queue status, and lab results — every one of these 404'd
        # at the gateway before ever reaching healthcare-core, even though
        # the routes exist and work fine once the request actually arrives.
        location /api/v1/patients/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/patients/(.*)$ /api/v1/healthcare/patients/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/appointments/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/appointments/(.*)$ /api/v1/healthcare/appointments/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/doctors/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/doctors/(.*)$ /api/v1/healthcare/doctors/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/clinical/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/clinical/(.*)$ /api/v1/healthcare/clinical/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/prescriptions/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/prescriptions/(.*)$ /api/v1/healthcare/prescriptions/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/tickets/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/v1/tickets/(.*)$ /api/v1/healthcare/tickets/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/walkin/ {
            limit_req zone=api_limit burst=200 nodelay;
            rewrite ^/api/v1/walkin/(.*)$ /api/v1/healthcare/walkin/$1 break;
            proxy_pass http://healthcare_core;
        }

        location /api/v1/lab_results/ {
            limit_req zone=api_limit burst=100 nodelay;
            rewrite ^/api/v1/lab_results/(.*)$ /api/v1/healthcare/lab_results/$1 break;
            proxy_pass http://healthcare_core;
        }

        # ── AI service ────────────────────────────────────────────────────────
        location /api/v1/ai/ {
            limit_req zone=ai_limit burst=20 nodelay;
            # AI calls can take longer (LLM latency)
            proxy_read_timeout 120s;
            proxy_pass http://ai_service;
        }

        # ── Notification service ──────────────────────────────────────────────
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://notification_service;
        }

        # ── Per-service health checks (for monitoring / load balancer probes) ─
        location = /health/auth {
            access_log off;
            proxy_pass http://auth_service/health;
        }

        location = /health/healthcare {
            access_log off;
            proxy_pass http://healthcare_core/health;
        }

        location = /health/ai {
            access_log off;
            proxy_pass http://ai_service/health;
        }

        location = /health/notifications {
            access_log off;
            proxy_pass http://notification_service/health;
        }

        # ── Block all other paths ─────────────────────────────────────────────
        location / {
            return 404 '{"error":"Not found"}';
            add_header Content-Type application/json;
        }

        # ── 429 Too Many Requests ─────────────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            add_header Content-Type application/json always;
            add_header Retry-After 1 always;
            return 429 '{"error":"Too many requests","retry_after":1}';
        }
    }
}
