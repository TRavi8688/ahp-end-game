[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
tb = short

markers =
    slow: marks tests as slow (deselect with -m 'not slow')
    integration: marks tests that require a live database
    unit: marks pure unit tests with no I/O

addopts =
    --strict-markers
    -ra
