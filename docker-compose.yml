version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true
      - AUTH_SERVICE_URL=http://auth-service:8001
      - HEALTHCARE_SERVICE_URL=http://healthcare-core:8002
    depends_on:
      - auth-service
      - healthcare-core

  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/auth-service/hospyn_auth_local.db
    ports:
      - "8001:8001"
    volumes:
      - auth_data:/app/auth-service

  healthcare-core:
    build:
      context: ./backend
      dockerfile: ./healthcare-core/Dockerfile
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/healthcare-core/hospyn_healthcare_local.db
      - REDIS_URL=redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      - redis
    volumes:
      - healthcare_data:/app/healthcare-core

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # NOTE: To serve frontend apps in production, we would add their Dockerfiles 
  # using NGINX here. Since this is a test environment, frontend apps can 
  # point to http://localhost:8000 for the Gateway.

volumes:
  auth_data:
  healthcare_data:
  redis_data:
