# docker-compose.yml
# MERGED: Phase 03 + 07 + 10 + 12 + 14 fixes combined
# Changes from last pushed version (phase 07):
#   - ai-service added (Phase 10)
#   - PgBouncer added (Phase 14 scalability)
#   - Redis port NOT exposed (Phase 07 — already correct, kept)
#   - SENTRY_DSN, PAGERDUTY keys passed through (Phase 12)
#   - FERNET_KEY, AUDIT_HMAC_SECRET added (Phase 13)
#   - OTP_HMAC_SECRET added (Phase 05)

version: '3.8'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospyn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-hospyn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospyn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Port NOT exposed externally — internal network only

  # ── PgBouncer (Phase 14 — connection pooler) ─────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hospyn}
      DB_USER: ${POSTGRES_USER:-hospyn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5432"

  # ── Redis (authenticated — Phase 07 fix retained) ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Port NOT exposed externally (OTP theft fix from Phase 07)

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-hospyn}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - FERNET_KEY=${FERNET_KEY:?FERNET_KEY must be set}
      - OTP_HMAC_SECRET=${OTP_HMAC_SECRET:-}
      - JWT_PRIVATE_KEY_PEM=${JWT_PRIVATE_KEY_PEM:-}
      - JWT_PUBLIC_KEY_PEM=${JWT_PUBLIC_KEY_PEM:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENV=${ENV:-development}
    ports:
      - "8001:8001"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Healthcare Core ────────────────────────────────────────────────────────────
  healthcare-core:
    build:
      context: ./backend
      dockerfile: ./healthcare-core/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-hospyn}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - AUDIT_HMAC_SECRET=${AUDIT_HMAC_SECRET:?AUDIT_HMAC_SECRET must be set}
      - JWT_PUBLIC_KEY_PEM=${JWT_PUBLIC_KEY_PEM:-}
      - AUTH_SERVICE_JWKS_URL=http://auth-service:8001/.well-known/jwks.json
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENV=${ENV:-development}
    ports:
      - "8002:8002"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── AI Service (Phase 10 — NEW) ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - AUTH_SERVICE_JWKS_URL=http://auth-service:8001/.well-known/jwks.json
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-hospyn}
      - AUDIT_HMAC_SECRET=${AUDIT_HMAC_SECRET}
      - ENV=${ENV:-development}
    ports:
      - "8003:8003"
    depends_on:
      - auth-service
      - healthcare-core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── API Gateway ────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true
      - AUTH_SERVICE_URL=http://auth-service:8001
      - HEALTHCARE_SERVICE_URL=http://healthcare-core:8002
      - AI_SERVICE_URL=http://ai-service:8003
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - ENV=${ENV:-development}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    depends_on:
      - auth-service
      - healthcare-core
      - ai-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
