version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hospyn_user
      POSTGRES_PASSWORD: hospyn_password
      POSTGRES_DB: hospyn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 3. FastAPI Backend
  api:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://hospyn_user:hospyn_password@db:5432/hospyn_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  # 4. Hospital ERP Frontend
  # To run this, you need to build the frontend Dockerfile
  # erp-frontend:
  #   build:
  #     context: ./hospital-erp
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:80"

volumes:
  postgres_data:
