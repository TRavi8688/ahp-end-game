version: '3.8'

# ============================================================
# HOSPYN - FIXED docker-compose.yml
# FIXES APPLIED:
#   - SQLite replaced with PostgreSQL
#   - Redis now requires password authentication
#   - Redis port NOT exposed to host (internal only)
#   - PostgreSQL health check before service start
#   - Secrets via environment variables (not hardcoded)
# ============================================================

services:

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true
      - AUTH_SERVICE_URL=http://auth-service:8001
      - HEALTHCARE_SERVICE_URL=http://healthcare-core:8002
    depends_on:
      auth-service:
        condition: service_started
      healthcare-core:
        condition: service_started
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    environment:
      # FIXED: Was sqlite+aiosqlite — now PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://hospyn:${POSTGRES_PASSWORD}@db:5432/hospyn_auth
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  healthcare-core:
    build:
      context: ./backend
      dockerfile: ./healthcare-core/Dockerfile
    environment:
      # FIXED: Was sqlite+aiosqlite — now PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://hospyn:${POSTGRES_PASSWORD}@db:5432/hospyn_healthcare
      # FIXED: Was redis://redis:6379 (no auth) — now with password
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hospyn
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Both databases created by init script
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    # FIXED: health check ensures services wait for DB to be truly ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospyn -d hospyn_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # NOTE: No 'ports:' section — DB is NOT exposed to host machine
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # FIXED: Added requirepass — Redis now requires authentication
    # FIXED: appendonly yes — data persists across restarts
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # NOTE: No 'ports:' section — Redis is NOT exposed to host (was 6379:6379)
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
