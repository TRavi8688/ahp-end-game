name: Hospyn CI/CD Pipeline
# Merged: Phase 08 (base pipeline) + Phase 11 (full test suite) + Phase 14 (Cloud Run deploy)
# Branch strategy: develop → staging → main (all require PR + passing tests)

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE_NAME: hospyn-backend

jobs:
  # ── 1. Security & Lint ───────────────────────────────────────────────────────
  security-scan:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install bandit safety ruff

      - name: Bandit SAST scan
        run: bandit -r backend/ -ll --exit-zero

      - name: Safety CVE scan
        run: safety check --json
        continue-on-error: true

      - name: Ruff lint
        run: ruff check backend/ start_api.py --select E,W,F --ignore E501

      - name: Detect hardcoded secrets
        run: |
          if grep -rn "your-secret-key\|changeme\|password123\|CUV3WDeZXcp\|enc\.key" \
              backend/ --include="*.py"; then
            echo "FAIL: Hardcoded secret or compromised key found"
            exit 1
          fi

  # ── 2. Full Test Suite (Phase 11) ────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_hospyn
          POSTGRES_PASSWORD: test_ci_only
          POSTGRES_DB: test_hospyn
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://test_hospyn:test_ci_only@localhost:5432/test_hospyn
      REDIS_URL: redis://localhost:6379/15
      SECRET_KEY: ci-test-secret-key-32-chars-minimum!!
      FERNET_KEY: ${{ secrets.TEST_FERNET_KEY }}
      AUDIT_HMAC_SECRET: ci-test-audit-hmac-secret-32-chars!!
      OTP_HMAC_SECRET: ci-test-otp-hmac-secret-32-chars!!!

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-interaction

      - name: Run Alembic migrations
        run: poetry run alembic upgrade head

      - name: Unit tests
        run: |
          poetry run pytest tests/ -m "unit" \
            --cov=backend \
            --cov-report=xml:coverage-unit.xml \
            -v --tb=short

      - name: Integration tests
        run: |
          poetry run pytest tests/ -m "integration" \
            --cov=backend \
            --cov-report=xml:coverage-int.xml \
            --cov-append \
            -v --tb=short

      - name: Red team tests (Phase 11 — Blueprint §16.2)
        run: |
          poetry run pytest scripts/red_team/ -v --tb=long

      - name: Chaos engineering tests (Phase 11 — Blueprint §16.2)
        run: |
          poetry run pytest scripts/chaos_simulation.py -v --tb=short
        continue-on-error: true  # Informational until resilience patterns are fully implemented

      - name: Enforce 70% coverage minimum
        run: poetry run coverage report --fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage-unit.xml
          fail_ci_if_error: false

  # ── 3. Build Docker Image ─────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
         credentials_json: ${{ secrets.GCP_SA_KEY }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hospyn/backend:${{ github.sha }}"
          docker build -f Dockerfile -t "$IMAGE" --target production .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

  # ── 4. Deploy to Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Run migrations on staging DB
        run: |
          gcloud run jobs execute hospyn-migrate-staging \
            --region ${{ env.REGION }} --wait

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: hospyn-backend-staging
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          secrets: |
            SECRET_KEY=hospyn-secret-key-staging:latest
            FERNET_KEY=hospyn-fernet-key-staging:latest
            AUDIT_HMAC_SECRET=hospyn-audit-hmac-staging:latest
            DATABASE_URL=hospyn-db-url-staging:latest
            REDIS_URL=hospyn-redis-url-staging:latest

      - name: Smoke test staging
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          curl -f "$URL/health" || (echo "Staging health check FAILED" && exit 1)

  # ── 5. Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production  # Requires manual approval in GitHub Environments

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Run migrations on production DB
        run: |
          gcloud run jobs execute hospyn-migrate-prod \
            --region ${{ env.REGION }} --wait

      - name: Deploy to Cloud Run (Production)
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --concurrency=80
            --min-instances=1
            --max-instances=10
            --cpu=2
            --memory=1Gi
          secrets: |
            SECRET_KEY=hospyn-secret-key:latest
            FERNET_KEY=hospyn-fernet-key:latest
            AUDIT_HMAC_SECRET=hospyn-audit-hmac:latest
            OTP_HMAC_SECRET=hospyn-otp-hmac:latest
            DATABASE_URL=hospyn-db-url-prod:latest
            REDIS_URL=hospyn-redis-url-prod:latest
            SENTRY_DSN=hospyn-sentry-dsn:latest
            PAGERDUTY_P0_KEY=hospyn-pd-p0-key:latest
            PAGERDUTY_P1_KEY=hospyn-pd-p1-key:latest
            JWT_PRIVATE_KEY_PEM=hospyn-jwt-private-pem:latest
            JWT_PUBLIC_KEY_PEM=hospyn-jwt-public-pem:latest

      - name: Verify production health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3; do
            if curl -sf "$URL/health"; then
              echo "Production deployment healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 15
          done
          echo "Production health check FAILED after 3 attempts!"
          exit 1
