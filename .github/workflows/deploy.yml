name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev tools
        run: pip install ruff bandit
      - name: Ruff lint (informational)
        run: ruff check backend/ start_api.py --select E,W,F --ignore E501 || true
      - name: Bandit security scan (informational)
        run: bandit -r backend/ -ll || true

  test:
    name: Test Suite
    runs-on: ubuntu-22.04
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospyn_test
          POSTGRES_PASSWORD: test_password_ci_only
          POSTGRES_DB: hospyn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://hospyn_test:test_password_ci_only@localhost:5432/hospyn_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      FERNET_KEY: ${{ secrets.TEST_FERNET_KEY }}
      AUDIT_HMAC_SECRET: ci_test_audit_secret_not_used_in_production
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - name: Run Alembic migrations on test DB
        run: poetry run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://hospyn_test:test_password_ci_only@localhost:5432/hospyn_test
      - name: Run tests with coverage
        run: |
          poetry run pytest --cov=app tests/ --cov-report=xml --cov-report=term-missing -v
        continue-on-error: true
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f Dockerfile.gateway -t hospyn-gateway:${{ github.sha }} .
      - name: Build api image
        run: docker build -f Dockerfile -t hospyn-api:${{ github.sha }} .
      - name: Build nginx image
        run: docker build -f nginx/Dockerfile -t hospyn-nginx:${{ github.sha }} .
      - name: Confirm all images built
        run: docker images | grep hospyn && echo "All images built OK"

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@v4

      # FIX: Your repo has GCP_SA_KEY_JSON (not GCP_SA_KEY).
      # Also supports Workload Identity if GCP_WORKLOAD_IDENTITY_PROVIDER is set.
      - name: Authenticate to GCP via SA Key JSON
        if: env.GCP_SA_KEY_JSON != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Authenticate to GCP via Workload Identity
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SA_KEY_JSON == ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push gateway image
        run: |
          docker build -f Dockerfile.gateway \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/hospyn-gateway:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/hospyn-gateway:${{ github.sha }}

      - name: Deploy gateway to Cloud Run
        run: |
          gcloud run deploy hospyn-gateway \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/hospyn-gateway:${{ github.sha }} \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://${{ secrets.NGINX_HOST }}/health || echo "WARNING: Smoke test failed"
