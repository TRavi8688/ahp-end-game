name: Hospyn CI — Tests & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Tests ───────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hospyn
          POSTGRES_PASSWORD: ci_test_password_not_real
          POSTGRES_DB: hospyn_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://hospyn:ci_test_password_not_real@localhost:5432/hospyn_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci_test_secret_key_that_is_definitely_not_the_default_value_and_is_64chars_long
          ENVIRONMENT: test
          SENTRY_DSN: ""
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50 \
            -v \
            tests/

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Secret Scanning ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ── Docker Build Validation ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hospyn-api-test .

      - name: Verify enc.key not in image
        run: |
          # FIXED: This would have PASSED before because enc.key was in the image
          result=$(docker run --rm hospyn-api-test find /app -name "enc.key" 2>/dev/null || true)
          if [ -n "$result" ]; then
            echo "CRITICAL: enc.key found inside Docker image!"
            exit 1
          fi
          echo "OK: enc.key is not present in the Docker image"

      - name: Verify archive directory not in image
        run: |
          result=$(docker run --rm hospyn-api-test ls /app/archive 2>/dev/null || true)
          if [ -n "$result" ]; then
            echo "FAIL: archive/ directory found in Docker image"
            exit 1
          fi
          echo "OK: archive/ not present in Docker image"

      - name: Check image size
        run: |
          SIZE=$(docker image inspect hospyn-api-test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 600 ]; then
            echo "WARNING: Image is larger than 600MB (${SIZE_MB}MB) — consider optimising"
          fi
