name: Hospyn Production CI Pipeline

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check code formatting (Black)
        run: black --check backend/

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test-services:
    needs: lint-and-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/auth-service/requirements.txt
          pip install -r backend/healthcare-core/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Auth Service Tests
        env:
          ENVIRONMENT: test
          SECRET_KEY: test_secret_key_must_be_at_least_32_characters_for_sentry_to_pass
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend/auth-service
          pytest

      - name: Run Healthcare Core Tests
        env:
          ENVIRONMENT: test
          JWT_SECRET_KEY: test_secret_key_must_be_at_least_32_characters_for_sentry_to_pass
          REDIS_URL: redis://localhost:6379/1
        run: |
          cd backend/healthcare-core
          pytest

  docker-validation:
    needs: test-services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Auth Service Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          file: ./backend/auth-service/Dockerfile.dev
          push: false
          tags: hospyn-auth:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Healthcare Core Dockerfile Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend/healthcare-core
          file: ./backend/healthcare-core/Dockerfile.dev
          push: false
          tags: hospyn-healthcare:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
