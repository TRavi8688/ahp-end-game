name: Hospyn CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1

jobs:
  # ── 1. Security Scan ─────────────────────────────────────────────────────
  security-scan:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install bandit ruff

      - name: Bandit SAST scan
        run: bandit -r backend/ -ll --exit-zero

      - name: Ruff lint
        run: ruff check backend/ start_api.py --select E,W,F --ignore E501

      - name: Detect hardcoded secrets
        run: |
          if grep -rn "your-secret-key\|changeme\|password123\|CUV3WDeZXcp" backend/ --include="*.py"; then
            echo "FAIL: Hardcoded secret found"
            exit 1
          fi
        continue-on-error: true

  # ── 2. Run Tests ─────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: security-scan
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_hospyn
          POSTGRES_PASSWORD: test_ci_only
          POSTGRES_DB: test_hospyn
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://test_hospyn:test_ci_only@localhost:5432/test_hospyn
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-32-chars-minimum!!
      FERNET_KEY: ${{ secrets.TEST_FERNET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short --timeout=30
        continue-on-error: true

  # ── 3. Build Docker Image ────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -f Dockerfile -t hospyn-backend:${{ github.sha }} .
        continue-on-error: true
