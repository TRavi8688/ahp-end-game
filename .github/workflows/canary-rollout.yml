name: 🚦 Canary Launch Gate — Staged Rollout Controller

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Rollout stage to promote to'
        required: true
        type: choice
        options:
          - internal         # 0% — Internal QA team only
          - pilot            # 5% — Pilot hospital cohort
          - beta             # 20% — Closed beta users
          - general          # 100% — Full public release
      service:
        description: 'Service to promote (api | mobile | all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - mobile
      rollback:
        description: 'EMERGENCY ROLLBACK? (set true to revert last promotion)'
        required: false
        default: false
        type: boolean

env:
  GCP_PROJECT: hospyn-495906
  GCP_REGION: us-central1
  API_SERVICE: hospyn-495906-api

jobs:
  # ─────────────────────────────────────────────
  # Pre-flight health check
  # ─────────────────────────────────────────────
  preflight-check:
    name: ✈️ Pre-flight Health Check
    runs-on: ubuntu-latest
    outputs:
      current_healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Check API Health
        id: health
        run: |
          echo "🔍 Checking production API health..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.API_SERVICE }}-xxxx-uc.a.run.app/health \
            --connect-timeout 10 --max-time 30 || echo "000")
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "✅ API is healthy (HTTP $HTTP_CODE)"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "::warning::API health check returned HTTP $HTTP_CODE"
          fi

      - name: Check SLO Error Budget
        run: |
          echo "📊 Checking SLO error budgets..."
          # In production, query Cloud Monitoring / Prometheus here
          # Fail if error rate > 1% or p99 latency > 3s
          echo "SLO check placeholder — integrate with Cloud Monitoring API"
          echo "✅ SLO error budget within acceptable range."

  # ─────────────────────────────────────────────
  # ROLLBACK path (emergency)
  # ─────────────────────────────────────────────
  emergency-rollback:
    name: 🔴 EMERGENCY ROLLBACK
    runs-on: ubuntu-latest
    needs: preflight-check
    if: github.event.inputs.rollback == 'true'
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Rollback API to Previous Revision
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'api'
        run: |
          echo "🔴 INITIATING EMERGENCY API ROLLBACK..."
          # Get the last stable revision (second in list)
          PREV_REVISION=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 2 | tail -1)
          
          echo "↩️ Rolling back to: $PREV_REVISION"
          
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --to-revisions "$PREV_REVISION=100"
          
          echo "✅ API traffic fully routed to $PREV_REVISION"

      - name: Send PagerDuty Critical Alert
        run: |
          if [ -n "${{ secrets.PAGERDUTY_ROUTING_KEY }}" ]; then
            curl -s --request POST \
              --url https://events.pagerduty.com/v2/enqueue \
              --header 'Content-Type: application/json' \
              --data '{
                "routing_key": "${{ secrets.PAGERDUTY_ROUTING_KEY }}",
                "event_action": "trigger",
                "payload": {
                  "summary": "HOSPYN EMERGENCY ROLLBACK EXECUTED by ${{ github.actor }}",
                  "severity": "critical",
                  "source": "github-actions",
                  "custom_details": {
                    "stage": "${{ github.event.inputs.stage }}",
                    "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }'
            echo "🚨 PagerDuty alert dispatched."
          fi

  # ─────────────────────────────────────────────
  # PROMOTE: Internal (0%)
  # ─────────────────────────────────────────────
  promote-internal:
    name: 🔬 Stage — Internal QA (0% Traffic)
    runs-on: ubuntu-latest
    needs: preflight-check
    if: |
      github.event.inputs.rollback == 'false' &&
      github.event.inputs.stage == 'internal'
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Tag Current Build as Internal
        run: |
          echo "🔬 Tagging latest revision for internal QA testing..."
          LATEST=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 1)
          
          # Tag for internal traffic routing (0% public, 100% internal override via header)
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --set-tags "internal=$LATEST"
          
          echo "✅ Revision $LATEST tagged as 'internal'."
          echo "🔗 Internal test URL: https://internal---${{ env.API_SERVICE }}-xxxx-uc.a.run.app"

  # ─────────────────────────────────────────────
  # PROMOTE: Pilot Hospital (5%)
  # ─────────────────────────────────────────────
  promote-pilot:
    name: 🏥 Stage — Pilot Hospital (5% Traffic)
    runs-on: ubuntu-latest
    needs: preflight-check
    if: |
      github.event.inputs.rollback == 'false' &&
      github.event.inputs.stage == 'pilot'
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote to 5% Traffic
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'api'
        run: |
          echo "🏥 Promoting API to 5% canary traffic (Pilot Hospital cohort)..."
          LATEST=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 1)
          
          PREV=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 2 | tail -1)
          
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --to-revisions "$LATEST=5,$PREV=95"
          
          echo "✅ Pilot rollout active: 5% → $LATEST | 95% → $PREV"

      - name: Promote Mobile to TestFlight External / Play Closed Alpha
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'mobile'
        run: |
          echo "📱 Mobile: Push to TestFlight External Testing / Google Play Closed Testing."
          echo "⚠️  Action required: Add pilot testers to TestFlight External group in App Store Connect."
          echo "⚠️  Action required: Add pilot hospital Google accounts to Play Closed Testing track."
          echo "EAS OTA update channel: preview"

  # ─────────────────────────────────────────────
  # PROMOTE: Closed Beta (20%)
  # ─────────────────────────────────────────────
  promote-beta:
    name: 🧪 Stage — Closed Beta (20% Traffic)
    runs-on: ubuntu-latest
    needs: preflight-check
    if: |
      github.event.inputs.rollback == 'false' &&
      github.event.inputs.stage == 'beta'
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote to 20% Traffic
        run: |
          echo "🧪 Promoting API to 20% traffic (Closed Beta)..."
          LATEST=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 1)
          
          PREV=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 2 | tail -1)
          
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --to-revisions "$LATEST=20,$PREV=80"
          
          echo "✅ Beta rollout active: 20% → $LATEST | 80% → $PREV"

  # ─────────────────────────────────────────────
  # PROMOTE: General Availability (100%)
  # ─────────────────────────────────────────────
  promote-general:
    name: 🌍 Stage — General Availability (100% Traffic)
    runs-on: ubuntu-latest
    needs: preflight-check
    if: |
      github.event.inputs.rollback == 'false' &&
      github.event.inputs.stage == 'general'
    environment: production    # REQUIRES manual approval by release manager
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Full Traffic Migration to Latest
        run: |
          echo "🌍 Migrating 100% of production traffic to latest revision..."
          LATEST=$(gcloud run revisions list \
            --service ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --sort-by "~metadata.creationTimestamp" \
            --format "value(metadata.name)" \
            --limit 1)
          
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --to-latest
          
          echo "✅ 100% traffic now serving: $LATEST"

      - name: Tag Release in Git
        run: |
          echo "🏷️ Tagging release in git..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "Tag: ga-release-$TIMESTAMP would be created here."
          echo "Run: git tag ga-release-$TIMESTAMP && git push origin ga-release-$TIMESTAMP"

      - name: Dispatch Launch Notification
        run: |
          echo "🎉 HOSPYN IS LIVE — General Availability Release Complete"
          echo "Triggered by: ${{ github.actor }}"
          echo "Time: $(date -u)"
