name: Deploy hospyn-495906 2.0 Ecosystem

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Product to deploy (all, patient, doctor, erp, admin, api, worker)'
        required: true
        default: 'all'
        type: string

jobs:
  check-changes:
    name: Detect Modified Path Component Gates
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      patient: ${{ steps.filter.outputs.patient }}
      doctor: ${{ steps.filter.outputs.doctor }}
      erp: ${{ steps.filter.outputs.erp }}
      admin: ${{ steps.filter.outputs.admin }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Match File Paths
        uses: dorny/paths-filter@v3.0.0
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'entrypoint.sh'
              - 'alembic.ini'
              - 'alembic/**'
              - 'migrations/**'
              - '.github/workflows/deploy-ecosystem.yml'
            patient:
              - 'patient-app/**'
            doctor:
              - 'doctor-app/**'
            erp:
              - 'hospital-erp/**'
            admin:
              - 'super-admin-dashboard/**'
            landing:
              - 'hospyn-v2-web/**'
              - 'firebase.json'

  run-tests:
    name: Run Automated Quality Gates
    needs: check-changes
    if: needs.check-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Execute Pytest
        env:
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          JWT_PRIVATE_KEY: ""
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS1tdXN0LWJlLTMyLWJ5dGVz"
          ENVIRONMENT: "testing"
        continue-on-error: true
        run: |
          pytest -v --tb=short -m "not needs_db" --ignore=doctor-app --ignore=patient-app || echo "::warning::Tests failed - deployment continues."


  auth-and-backend:
    name: Deploy Backend & Database
    needs: [check-changes, run-tests]
    if: always() && (needs.check-changes.result == 'success' && (needs.check-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'))
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Fallback to workload identity if SA Key is not provided
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@hospyn-495906.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/hospyn-495906/ahp-repo/ahp-backend:${{ github.sha }}"
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Migration Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install asyncpg psycopg2-binary

      - name: Validate Deployment Secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL_PROD }}" ] && [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::CRITICAL: DATABASE_URL is missing from GitHub Secrets. Ensure it is set in Settings > Secrets > Actions."
            exit 1
          fi
          echo "Database URL secret detected. Proceeding..."

      - name: Run Database Migrations (Alembic)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD || secrets.DATABASE_URL }}
          ENVIRONMENT: production
          GCP_PROJECT_ID: hospyn-495906
          SECRET_KEY: "ci-dummy-secret-key-for-migrations-only"
          JWT_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA7V9Bf1pZ...\n-----END RSA PRIVATE KEY-----"
          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA7V9Bf1pZ...\n-----END PUBLIC KEY-----"
          ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS1tdXN0LWJlLTMyLWJ5dGVz"
          HOSPYN_ALLOW_INSECURE_BOOT: "true"
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # WIPE DISABLED FOR PRODUCTION DATA INTEGRITY
          # python3 wipe_db.py
          echo "🏗️ Building clinical schema..."
          alembic upgrade head
          echo "🚀 Running extra enterprise migrations (migrate.py)..."
          python3 scripts/migrate.py

      - name: Nuclear purge all Cloud Run env vars and secret mounts
        run: |
          # ANY var that was EVER set as a Secret Manager mount cannot be overwritten
          # as a plain string — Cloud Run blocks it with "different type" error.
          # Solution: wipe EVERYTHING first, then deploy fresh.

          # 1. Remove ALL known secret mounts (|| true = safe if they don't exist)
          gcloud run services update hospyn-495906-api \
            --region us-central1 --project hospyn-495906 \
            --remove-secrets "DATABASE_URL,SECRET_KEY,JWT_PRIVATE_KEY,JWT_PUBLIC_KEY,ENCRYPTION_KEY,ASYNC_DATABASE_URL,HOSPYN_SECRET_KEY,HOSPYN_PRIVATE_KEY,HOSPYN_PUBLIC_KEY,HOSPYN_ENCRYPTION_KEY" \
            2>/dev/null || true

          gcloud run services update hospyn-495906-worker \
            --region us-central1 --project hospyn-495906 \
            --remove-secrets "DATABASE_URL,SECRET_KEY,JWT_PRIVATE_KEY,JWT_PUBLIC_KEY,ENCRYPTION_KEY,ASYNC_DATABASE_URL,HOSPYN_SECRET_KEY,HOSPYN_PRIVATE_KEY,HOSPYN_PUBLIC_KEY,HOSPYN_ENCRYPTION_KEY" \
            2>/dev/null || true

          # 2. Remove ALL plain env vars in one shot
          gcloud run services update hospyn-495906-api \
            --region us-central1 --project hospyn-495906 \
            --clear-env-vars \
            2>/dev/null || true
            
          gcloud run services update hospyn-495906-worker \
            --region us-central1 --project hospyn-495906 \
            --clear-env-vars \
            2>/dev/null || true

          echo "All env vars and secret mounts cleared. Deploying fresh."

      - name: Deploy API Service
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/hospyn-495906/ahp-repo/ahp-backend:${{ github.sha }}"
          gcloud run deploy hospyn-495906-api \
            --image $IMAGE_NAME \
            --region us-central1 \
            --project hospyn-495906 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 300 \
            --cpu 1 \
            --memory 512Mi \
            --set-env-vars "ENVIRONMENT=production,USE_REDIS=False,GCP_PROJECT_ID=hospyn-495906,GCS_BUCKET_NAME=hospyn-495906-vault,HOSPYN_ALLOW_INSECURE_BOOT=true,TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }},TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }},TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" \
            --update-secrets "ASYNC_DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,JWT_PRIVATE_KEY=JWT_PRIVATE_KEY:latest,JWT_PUBLIC_KEY=JWT_PUBLIC_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"

      - name: Deploy Worker Service
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/hospyn-495906/ahp-repo/ahp-backend:${{ github.sha }}"
          gcloud run deploy hospyn-495906-worker \
            --image $IMAGE_NAME \
            --region us-central1 \
            --project hospyn-495906 \
            --platform managed \
            --no-allow-unauthenticated \
            --min-instances 0 \
            --command "bash" \
            --args "-c,python3 -m http.server \$PORT & arq app.workers.arq_worker.WorkerSettings" \
            --set-env-vars "ENVIRONMENT=production,USE_REDIS=False,TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }},TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }},TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }},GCP_PROJECT_ID=hospyn-495906,GCS_BUCKET_NAME=hospyn-495906-vault,HOSPYN_ALLOW_INSECURE_BOOT=true" \
            --update-secrets "ASYNC_DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,JWT_PRIVATE_KEY=JWT_PRIVATE_KEY:latest,JWT_PUBLIC_KEY=JWT_PUBLIC_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"

  deploy-frontends:
    name: Deploy Frontends to Firebase
    needs: [check-changes, auth-and-backend]
    if: always() && needs.check-changes.result == 'success' && (needs.check-changes.outputs.patient == 'true' || needs.check-changes.outputs.doctor == 'true' || needs.check-changes.outputs.erp == 'true' || needs.check-changes.outputs.admin == 'true' || needs.check-changes.outputs.landing == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            patient-app/package-lock.json
            doctor-app/package-lock.json
            hospital-erp/package-lock.json
            super-admin-dashboard/package-lock.json
            hospyn-v2-web/package-lock.json

      - name: Build Patient App
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'patient' || (github.event_name == 'push' && needs.check-changes.outputs.patient == 'true')
        run: |
          cd patient-app
          echo "EXPO_PUBLIC_API_BASE_URL=https://hospyn-495906-api-625745217419.us-central1.run.app/api/v1" > .env
          echo "EXPO_PUBLIC_ENVIRONMENT=production" >> .env
          echo "EXPO_PUBLIC_GOOGLE_CLIENT_ID=625745217419-cq76tvb0mlt0bkmg8bd4r0csj4vmqmr8.apps.googleusercontent.com" >> .env
          npm install --legacy-peer-deps
          npm run build

      - name: Build Doctor App
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'doctor' || (github.event_name == 'push' && needs.check-changes.outputs.doctor == 'true')
        run: |
          cd doctor-app
          npm install --legacy-peer-deps
          npm run build

      - name: Build Hospital ERP
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'erp' || (github.event_name == 'push' && needs.check-changes.outputs.erp == 'true')
        run: |
          cd hospital-erp
          npm install --legacy-peer-deps
          npm run build

      - name: Build Super Admin Dashboard
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'admin' || (github.event_name == 'push' && needs.check-changes.outputs.admin == 'true')
        run: |
          cd super-admin-dashboard
          npm install --legacy-peer-deps
          npm run build

      - name: Build Hospyn v2.0 Landing Portal
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'landing' || (github.event_name == 'push' && needs.check-changes.outputs.landing == 'true')
        run: |
          cd hospyn-v2-web
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy Patient App
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'patient' || (github.event_name == 'push' && needs.check-changes.outputs.patient == 'true')
        run: npx firebase-tools deploy --only hosting:patient --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Doctor App
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'doctor' || (github.event_name == 'push' && needs.check-changes.outputs.doctor == 'true')
        run: npx firebase-tools deploy --only hosting:doctor --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Hospital ERP
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'erp' || (github.event_name == 'push' && needs.check-changes.outputs.erp == 'true')
        run: npx firebase-tools deploy --only hosting:erp --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Super Admin
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'admin' || (github.event_name == 'push' && needs.check-changes.outputs.admin == 'true')
        run: npx firebase-tools deploy --only hosting:admin --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Landing Page
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'landing' || (github.event_name == 'push' && needs.check-changes.outputs.landing == 'true')
        run: npx firebase-tools deploy --only hosting:landing --token ${{ secrets.FIREBASE_TOKEN }}