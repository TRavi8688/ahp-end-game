# backend/healthcare-core/docker-compose.test.yml
# DB-7 FIX: Spin up a real PostgreSQL instance for tests in CI.
# Usage: docker compose -f docker-compose.test.yml up -d && pytest && docker compose -f docker-compose.test.yml down

version: "3.9"

services:
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: hospyn_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d hospyn_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data   # in-memory for speed, no disk I/O during tests
