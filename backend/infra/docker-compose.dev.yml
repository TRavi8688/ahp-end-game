services:
  # -----------------------------------------
  # 1. API Gateway
  # -----------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: hospyn_nginx
    ports:
      - "8000:8000"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - healthcare-core
    networks:
      - hospyn_net
    restart: unless-stopped

  # -----------------------------------------
  # 2. Authentication Service
  # -----------------------------------------
  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile.dev
    container_name: hospyn_auth
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hospyn_auth_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    volumes:
      - ../auth-service:/app
      - ../shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hospyn_net
    restart: unless-stopped

  # -----------------------------------------
  # 3. Healthcare Core Modular Monolith
  # -----------------------------------------
  healthcare-core:
    build:
      context: ../healthcare-core
      dockerfile: Dockerfile.dev
    container_name: hospyn_core
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hospyn_healthcare_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ../healthcare-core:/app
      - ../shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - hospyn_net
    restart: unless-stopped

  # -----------------------------------------
  # 4. Infrastructure (DB, Cache, Storage)
  # -----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: hospyn_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hospyn_pg_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hospyn_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hospyn_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - hospyn_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hospyn_net
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: hospyn_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hospyn_minio_data:/data
    networks:
      - hospyn_net
    restart: unless-stopped

volumes:
  hospyn_pg_data:
  hospyn_redis_data:
  hospyn_minio_data:

networks:
  hospyn_net:
    driver: bridge
