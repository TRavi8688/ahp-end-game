# backend/infra/docker-compose.yml
# DB-2 FIX: Separate databases and scoped users for auth-service and healthcare-core.

version: "3.9"

services:
  # ─────────────────────────────────────────────────────
  # Single PostgreSQL instance, two logical databases
  # ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospyn_admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: postgres   # default DB; init script creates the real ones
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospyn_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  auth-service:
    build: ../auth-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_user:${AUTH_DB_PASSWORD}@db:5432/hospyn_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8001:8000"

  healthcare-core:
    build: ../healthcare-core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare_user:${HEALTHCARE_DB_PASSWORD}@db:5432/hospyn_healthcare
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      FERNET_KEY: ${FERNET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8002:8000"

  ai-service:
    build: ../ai-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_user:${AI_DB_PASSWORD}@db:5432/hospyn_ai
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8003:8000"

volumes:
  postgres_data:
