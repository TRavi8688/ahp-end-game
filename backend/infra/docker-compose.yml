# infra/docker-compose.yml
#
# FIXES:
#   - Added notification-service (was completely missing)
#   - Added nginx service (was missing — nothing was routing traffic)
#   - Added AUTH_JWKS_URL to healthcare-core so RS256 validation works
#   - Added JWT_PRIVATE_KEY_PEM / JWT_PUBLIC_KEY_PEM for RS256 in auth-service
#   - Added INTERNAL_SERVICE_SECRET to all services
#   - Added SERVICE_NAME to healthcare-core for internal service auth
#   - Added healthchecks to all services for depends_on ordering
#   - Redis healthcheck now uses password
#
# PLACE AT: backend/infra/docker-compose.yml

version: "3.9"

services:

  # ── PostgreSQL — single instance, 4 logical databases ──────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospin_admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospin_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis — authenticated, two DBs (index 0 = auth, 1 = healthcare) ────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://auth_user:${AUTH_DB_PASSWORD}@db:5432/hospyn_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # RS256 keys (base64-encoded PEM) — generate once and store in secrets manager
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      # Internal service auth
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SERVICE_NAME: auth-service
      # Twilio (OTP SMS)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Healthcare Core ─────────────────────────────────────────────────────────
  healthcare-core:
    build:
      context: ../healthcare-core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://healthcare_user:${HEALTHCARE_DB_PASSWORD}@db:5432/hospyn_healthcare
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      # Auth — RS256 JWKS URL (validates tokens without shared secret)
      AUTH_JWKS_URL: http://auth-service:8000/api/v1/auth/.well-known/jwks.json
      # PHI encryption
      FERNET_KEY: ${FERNET_KEY}
      # Internal service auth
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SERVICE_NAME: healthcare-core
      # Partner JWT
      PARTNER_JWT_SECRET: ${PARTNER_JWT_SECRET}
      # Storage
      GCP_STORAGE_BUCKET: ${GCP_STORAGE_BUCKET:-hospin-medical-records}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Pool sizing (can override here without rebuilding image)
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-40}
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── AI Service ──────────────────────────────────────────────────────────────
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      healthcare-core:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://ai_user:${AI_DB_PASSWORD}@db:5432/hospyn_ai
      # Internal calls to healthcare-core for patient data
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SERVICE_NAME: ai-service
      HEALTHCARE_CORE_URL: http://healthcare-core:8000
      # LLM providers
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Notification Service — FIX: was completely missing from this file ───────
  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://notification_user:${NOTIFICATION_DB_PASSWORD}@db:5432/hospyn_notifications
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      # Internal auth
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SERVICE_NAME: notification-service
      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      # Firebase (push notifications)
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx — API gateway / reverse proxy — FIX: was completely missing ───────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      healthcare-core:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
