# ─────────────────────────────────────────────────────────────────────────────
# PATCH: docker-compose.yml
#
# Add the following service block. Place it after the auth-service definition.
# Also add NOTIFICATION_SERVICE_URL and INTERNAL_SERVICE_SECRET to the
# auth-service environment block (shown at the bottom).
# ─────────────────────────────────────────────────────────────────────────────

services:

  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    environment:
      ENV: development
      PORT: 8004
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_notifications
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SMS_TEST_MODE: "true"           # set to "false" in production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hospyn_internal
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/v1/notifications/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
# Add to auth-service environment block:
# ─────────────────────────────────────────────────────────────────────────────

  auth-service:
    # ... existing config ...
    environment:
      # ... existing env vars ...
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      # ... existing depends_on ...
      notification-service:
        condition: service_healthy
