[pytest]
# Phase 11 Fix — pytest configuration for Hospyn test suite
asyncio_mode = auto
testpaths = tests scripts
python_files = test_*.py *_test.py red_team_*.py chaos_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage requirement (Blueprint target: 85%)
addopts =
    --strict-markers
    --tb=short
    -v

markers =
    unit: Pure unit tests (no I/O)
    integration: Tests requiring DB/Redis/network
    red_team: Security red-team attack simulations
    chaos: Chaos engineering resilience tests
    slow: Tests that take > 1s

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Timeout for each test (prevents hangs)
timeout = 30
