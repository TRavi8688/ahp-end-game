events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Basic Rate Limiting (Optional, but good practice)
    # limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    server {
        listen 8000;
        
        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Route Auth Service — forwards /api/v1/auth/* to auth-service
        location /api/v1/auth/ {
            proxy_pass http://auth-service:8000/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Healthcare Core — forwards /api/v1/healthcare/* to healthcare-core
        location /api/v1/healthcare/ {
            proxy_pass http://healthcare-core:8000/api/v1/healthcare/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service health checks (for monitoring/LB)
        location /health/auth {
            proxy_pass http://auth-service:8000/health;
            proxy_set_header Host $host;
        }

        location /health/healthcare {
            proxy_pass http://healthcare-core:8000/health;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }
    }
}
