# docker-compose.yml
# PHASE 07 + 08 FIXES APPLIED:
#   1. SQLite replaced with PostgreSQL for both services (CRITICAL)
#   2. Redis password added — no longer unauthenticated (CRITICAL)
#   3. Redis port 6379 no longer publicly exposed (HIGH)
#   4. postgres port 5432 not exposed externally (internal only)
#   5. All secrets pulled from .env file — never hardcoded here
#   6. healthcheck added to postgres so services wait for it to be ready
#   7. depends_on with condition: service_healthy for postgres

version: '3.8'

services:

  # ─────────────────────────────────────────────
  # POSTGRES — replaces SQLite entirely
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospyn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}      # REQUIRED — must be set in .env
      POSTGRES_DB: ${POSTGRES_DB:-hospyn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # FIX: NOT exposed externally. Internal network only.
    # ports: — intentionally omitted
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospyn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # REDIS — with password, not exposed externally
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # FIX: requirepass — Redis no longer unauthenticated
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    # FIX: Port NOT exposed externally (was "6379:6379" — anyone on host could read OTPs)
    # ports: — intentionally omitted
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # AUTH SERVICE
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile
    environment:
      # FIX: PostgreSQL URL — replaces sqlite+aiosqlite
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hospyn}_auth
      - SECRET_KEY=${SECRET_KEY}
      - FERNET_KEY_PATH=/run/secrets/enc_key
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # HEALTHCARE CORE
  # ─────────────────────────────────────────────
  healthcare-core:
    build:
      context: ./backend
      dockerfile: ./healthcare-core/Dockerfile
    environment:
      # FIX: PostgreSQL URL — replaces sqlite+aiosqlite
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hospyn}
      # FIX: Redis URL with password
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true
      - AUTH_SERVICE_URL=http://auth-service:8001
      - HEALTHCARE_SERVICE_URL=http://healthcare-core:8002
      # CORS: set to your actual frontend domain(s) — never use "*" in production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - auth-service
      - healthcare-core
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

# ──────────────────────────────────────────────────────────
# USAGE:
#   1. Copy .env.example to .env
#   2. Fill in POSTGRES_PASSWORD, REDIS_PASSWORD, SECRET_KEY
#   3. docker-compose up -d
#   4. Run migrations: docker-compose exec auth-service alembic upgrade head
# ──────────────────────────────────────────────────────────
