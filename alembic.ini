# alembic.ini
# PHASE 4 FIX: sqlalchemy.url must NOT be hardcoded here.
# It is read from the DATABASE_URL environment variable in alembic/env.py.
# Previously this may have pointed to SQLite — that is now blocked.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Do NOT set sqlalchemy.url here — set DATABASE_URL environment variable instead.
# env.py reads it via os.environ["DATABASE_URL"]
# sqlalchemy.url =    (intentionally blank)

file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
