<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Hospin Clinical Wallet</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #050810;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #diagnostic-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #050810;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(99, 102, 241, 0.1);
        border-top: 4px solid #6366F1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      #error-box {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
        max-width: 600px;
        width: 90%;
        text-align: left;
        color: #FCA5A5;
        font-family: monospace;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .brand {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.5px;
        color: #6366F1;
        margin-bottom: 10px;
      }
      .subtext {
        font-size: 14px;
        color: #94A3B8;
        margin-bottom: 20px;
      }
    </style>
    <script>
      // Clear cache on boot if it's a dev build
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }

      // Catch ANY boot error and show it directly
      window.onerror = function(msg, url, line, col, error) {
        var errBox = document.getElementById('error-box');
        var spinner = document.getElementById('diagnostic-spinner');
        var subtext = document.getElementById('diagnostic-subtext');
        
        if (spinner) spinner.style.display = 'none';
        if (subtext) subtext.innerText = 'Clinical Vault Boot Failed';
        
        if (errBox) {
          errBox.style.display = 'block';
          errBox.innerHTML = '<strong>RUNTIME CRITICAL FAULT:</strong><br/><br/>' + 
            'Message: ' + msg + '<br/>' +
            'Source: ' + url + '<br/>' +
            'Line: ' + line + ' | Column: ' + col + '<br/><br/>' +
            (error && error.stack ? 'Stack Trace:<br/>' + error.stack : '');
        }
        return false;
      };
    </script>
  </head>

  <body>
    <div id="diagnostic-overlay">
      <div class="brand">HOSPIN <span style="color: white;">CLINICAL</span></div>
      <div id="diagnostic-subtext" class="subtext">Securing Sovereign Ledger...</div>
      <div id="diagnostic-spinner" class="spinner"></div>
      
      <div id="error-box"></div>
    </div>

    <div id="root"></div>

    <script>
      // Remove overlay once React mounts successfully
      var checkInterval = setInterval(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var overlay = document.getElementById('diagnostic-overlay');
          if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.pointerEvents = 'none';
            setTimeout(function() { overlay.remove(); }, 500);
          }
          clearInterval(checkInterval);
        }
      }, 300);
      
      // Auto-hide diagnostic overlay after 10 seconds if React mounts but leaves overlay
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var overlay = document.getElementById('diagnostic-overlay');
          if (overlay) overlay.remove();
        }
      }, 10000);
    </script>
  </body>
</html>
