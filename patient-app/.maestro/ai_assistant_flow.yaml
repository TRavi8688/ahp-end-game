appId: com.hospyn.patientapp
---
# ─── Test: AI Assistant screen ───────────────────────────────────────────────
- launchApp

- assertVisible: "Dashboard"

- tapOn: "AI Assistant"

# Screen must open and show an input
- assertVisible:
    anyOf:
      - text: "AI Assistant"
      - text: "Ask me anything"
      - text: "How can I help"

# Back navigation works
- pressKey: Back
- assertVisible: "Dashboard"
