appId: com.hospyn.patientapp
---
# ─── Test: Login flow ─────────────────────────────────────────────────────────
- launchApp:
    clearState: true

# Wait for phone input screen
- assertVisible: "Enter your phone number"

- tapOn:
    id: "phone-input"
- inputText: "9999999999"

- tapOn: "Send OTP"

# OTP screen
- assertVisible: "Enter OTP"

- tapOn:
    id: "otp-input"
- inputText: "123456"

- tapOn: "Verify"

# Dashboard should load
- assertVisible: "Dashboard"
- assertVisible: "Upcoming Appointments"
