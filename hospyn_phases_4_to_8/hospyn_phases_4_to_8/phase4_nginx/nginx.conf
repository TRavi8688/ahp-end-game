##############################################################################
# HOSPYN — NGINX CONFIGURATION
# Phase 4 Fix: Security headers (CSP, HSTS, X-Frame-Options, etc.)
# Apply this file to: nginx.conf in your repo root
##############################################################################

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging format with request ID for distributed tracing
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" req_id=$request_id';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Generate unique request ID for distributed tracing
    # -------------------------------------------------------------------------
    map $http_x_request_id $request_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;  # Do not reveal nginx version

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=otp_limit:10m  rate=5r/m;

    # -------------------------------------------------------------------------
    # Upstream services
    # -------------------------------------------------------------------------
    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }
    upstream healthcare_core {
        server healthcare-core:8002;
        keepalive 32;
    }
    upstream ai_service {
        server ai-service:8003;
        keepalive 16;
    }
    upstream notification_service {
        server notification-service:8004;
        keepalive 16;
    }

    # =========================================================================
    # MAIN API SERVER
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------------
        # PHASE 4 FIX — Security Headers
        # These were MISSING before this fix. All added below.
        # ---------------------------------------------------------------------

        # Content Security Policy — prevents XSS exfiltration of patient data
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.hospyn.com; object-src 'none'; frame-ancestors 'none';"
            always;

        # HTTP Strict Transport Security — forces HTTPS, 2 years, include subdomains
        add_header Strict-Transport-Security
            "max-age=63072000; includeSubDomains; preload"
            always;

        # Prevent clickjacking attacks
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Control referrer information sent to other sites
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Disable browser features not needed by Hospyn
        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=()"
            always;

        # Pass request ID to upstream for tracing
        add_header X-Request-ID $request_id always;

        # ---------------------------------------------------------------------
        # Health check endpoint (no auth required)
        # ---------------------------------------------------------------------
        location /health {
            proxy_pass http://healthcare_core/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /auth/health {
            proxy_pass http://auth_service/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ---------------------------------------------------------------------
        # Auth service routes — tighter rate limits
        # ---------------------------------------------------------------------
        location /api/v1/auth/otp {
            limit_req zone=otp_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://auth_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # JWKS endpoint for RS256 public key distribution
        location /.well-known/jwks.json {
            proxy_pass http://auth_service/.well-known/jwks.json;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
        }

        # ---------------------------------------------------------------------
        # Healthcare Core routes
        # ---------------------------------------------------------------------
        location /api/v1/healthcare/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://healthcare_core;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts for long-running operations
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # WebSocket for real-time queue updates (doctor-app)
        location /ws {
            proxy_pass http://healthcare_core;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;  # Keep WebSocket alive
        }

        # ---------------------------------------------------------------------
        # AI Service routes
        # ---------------------------------------------------------------------
        location /api/v1/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://ai_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;  # AI inference can be slow
        }

        # ---------------------------------------------------------------------
        # Notification Service routes (Phase 3 — new service)
        # ---------------------------------------------------------------------
        location /api/v1/notify/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://notification_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ---------------------------------------------------------------------
        # Metrics endpoint (Prometheus scrape — restrict to internal only)
        # ---------------------------------------------------------------------
        location /metrics {
            # Only allow internal Docker network access to Prometheus metrics
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://healthcare_core/metrics;
            proxy_set_header Host $host;
        }

        # ---------------------------------------------------------------------
        # Block common attack paths
        # ---------------------------------------------------------------------
        location ~* \.(env|git|sql|bak|key|pem|log)$ {
            return 404;
        }

        location ~ /\. {
            deny all;
            return 404;
        }

        # ---------------------------------------------------------------------
        # 429 rate limit response
        # ---------------------------------------------------------------------
        error_page 429 @rate_limit;
        location @rate_limit {
            default_type application/json;
            return 429 '{"detail":"Too many requests. Please slow down.","status":429}';
        }
    }
}
