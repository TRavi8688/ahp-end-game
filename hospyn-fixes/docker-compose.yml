version: "3.9"

# =============================================================================
# Hospyn local development stack
# FIXES:
#   - SQLite replaced with PostgreSQL for both services
#   - Redis requires password (REDIS_PASSWORD env var)
#   - Redis port NOT exposed on host (internal network only)
#   - All secrets from .env (copy .env.example → .env and fill values)
#   - ALLOWED_ORIGINS required — no wildcard default
# =============================================================================

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospyn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Required — no default
      POSTGRES_DB: ${POSTGRES_DB:-hospyn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospyn} -d ${POSTGRES_DB:-hospyn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hospyn_internal
    # NO ports: exposed — access via internal network only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hospyn_internal
    # NO ports: exposed on host — internal only

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: development
      PORT: 8001
      DOCKER_ENV: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hospyn}_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hospyn_internal
    ports:
      - "8001:8001"  # Only exposed in dev; remove in production (use gateway only)

  healthcare-core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: development
      PORT: 8002
      DOCKER_ENV: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hospyn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hospyn}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hospyn_internal
    ports:
      - "8002:8002"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    environment:
      ENV: development
      PORT: 8000
      DOCKER_ENV: "true"
      AUTH_SERVICE_URL: http://auth-service:8001
      HEALTHCARE_SERVICE_URL: http://healthcare-core:8002
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - auth-service
      - healthcare-core
    ports:
      - "8000:8000"
    networks:
      - hospyn_internal

volumes:
  postgres_data:
  redis_data:

networks:
  hospyn_internal:
    driver: bridge
