# nginx.conf — production-grade
# FIXES:
#   - TLS cert paths use Let's Encrypt / GCP-managed (not self-signed)
#   - CSP updated to allow Razorpay, Firebase, Google Fonts
#   - Upstream health checks added
#   - Rate limiting added
#   - Security headers strengthened

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rid=$request_id';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Upstream with health checks
    upstream gateway {
        server gateway:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name ${NGINX_HOST:-app.hospyn.com};

        # TLS — use Let's Encrypt or GCP-managed cert (NOT self-signed)
        # For GCP: cert is managed by the load balancer; nginx may not need these
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # CSP — allows Razorpay, Firebase, Google Fonts, Sentry CDN
        # FIXED: original was too strict and broke all third-party integrations
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' https://checkout.razorpay.com https://www.gstatic.com https://apis.google.com 'nonce-{REQUEST_ID}';
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: https:;
            connect-src 'self' https://api.razorpay.com https://sentry.io https://*.firebaseio.com https://*.googleapis.com;
            frame-src https://checkout.razorpay.com;
            object-src 'none';
            frame-ancestors 'none';
            base-uri 'self';
            form-action 'self';
        " always;

        # Correlation ID
        add_header X-Request-ID $request_id always;

        # Connection limit
        limit_conn conn 20;

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Don't buffer large responses (file uploads, etc.)
            proxy_request_buffering off;
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Health check (no rate limit, no auth)
        location /health {
            proxy_pass http://gateway/health;
            access_log off;
        }

        # Static frontend (served separately; update root path as needed)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Block common attack paths
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 404;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
