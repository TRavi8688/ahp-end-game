<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Hospain — Care Beyond Today</title>
    <meta name="description" content="Hospain — Care Beyond Today. India's hospital management platform. Book appointments, manage records, AI-powered health assistance." />
    <meta name="keywords" content="hospital management, appointment booking, health records, AI health, India healthcare platform, DPDP, patient management" />
    <meta name="author" content="Hospain Technologies Pvt Ltd" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hospain.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hospain.in/" />
    <meta property="og:title" content="Hospain — Smart Hospital Management" />
    <meta property="og:description" content="India's hospital management platform. Book appointments, manage records, AI-powered health assistance." />
    <meta property="og:image" content="https://hospain.in/og-image.png" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Hospain" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://hospain.in/" />
    <meta name="twitter:title" content="Hospain — Smart Hospital Management" />
    <meta name="twitter:description" content="India's hospital management platform. Book appointments, manage records, AI-powered health assistance." />
    <meta name="twitter:image" content="https://hospain.in/og-image.png" />

    <!-- Structured Data: Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Hospain Technologies Pvt Ltd",
      "url": "https://hospain.in",
      "logo": "https://hospain.in/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-40-4000-1234",
        "contactType": "customer support",
        "areaServed": "IN",
        "availableLanguage": ["English", "Hindi"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Hyderabad",
        "addressRegion": "Telangana",
        "addressCountry": "IN"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Hospain",
      "operatingSystem": "Web, Android, iOS",
      "applicationCategory": "HealthApplication",
      "description": "India's hospital management platform for appointment booking, health records, and AI-powered health assistance.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>

    <!-- Geo targeting for India -->
    <meta name="geo.region" content="IN-TG" />
    <meta name="geo.placename" content="Hyderabad" />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#0d1117" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
