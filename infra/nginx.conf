# infra/nginx.conf
#
# Hospin Production Gateway
# Single entry point — one domain, one TLS cert, zero CORS issues.
#
#   /api/v1/auth/*   →  auth-service      (port 8001)
#   /api/*           →  healthcare-core   (port 8000)
#   /*               →  React SPA         (/usr/share/nginx/html)
#
# ⚠️  REPLACE "hospyn.com" below with your actual production domain
#     before deploying — server_name and ssl_certificate paths both
#     reference it and must match your real DNS + cert.

upstream auth_service {
    server 127.0.0.1:8001;
    keepalive 32;
}

upstream healthcare_core {
    server 127.0.0.1:8000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name hospyn.com www.hospyn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hospyn.com www.hospyn.com;

    ssl_certificate     /etc/letsencrypt/live/hospyn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hospyn.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           strict-origin-when-cross-origin;

    # Auth Service — MUST be before /api/ catch-all
    location /api/v1/auth/ {
        proxy_pass         http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # Healthcare Core — all other API routes
    location /api/ {
        proxy_pass         http://healthcare_core;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        # For document uploads in ActivationWizard (NABH cert, PAN photo, selfie)
        client_max_body_size 20M;
    }

    # React SPA — serve index.html for all non-API routes
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
