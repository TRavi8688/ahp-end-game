# backend/infra/docker-compose.yml
#
# PLACE AT: backend/infra/docker-compose.yml
#
# FIX 1: Replaced init-db.sql volume with init-db.sh (fixes password substitution)
# FIX 2: Added notification-service (was completely missing)
# FIX 3: Fixed auth-service: JWT_PRIVATE_KEY → JWT_SECRET_KEY
# FIX 4: Added JWT_SECRET_KEY, SENTRY_DSN, INTERNAL_SERVICE_SECRET to all services
# FIX 5: Added redis healthcheck
# FIX 6: Added NOTIFICATION_DB_PASSWORD to infra/.env vars

version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospyn_admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      HEALTHCARE_DB_PASSWORD: ${HEALTHCARE_DB_PASSWORD}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # FIX 1: Use shell script instead of SQL (fixes password substitution)
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospyn_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    # FIX 5: Added healthcheck so services wait for Redis to be ready
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build: ../auth-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_user:${AUTH_DB_PASSWORD}@db:5432/hospyn_auth
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # FIX 3: Was JWT_PRIVATE_KEY — auth-service uses JWT_SECRET_KEY (symmetric HMAC)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENV: ${ENVIRONMENT:-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Healthcare Core ───────────────────────────────────────────────────────────
  healthcare-core:
    build: ../healthcare-core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://healthcare_user:${HEALTHCARE_DB_PASSWORD}@db:5432/hospyn_healthcare
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      FERNET_KEY: ${FERNET_KEY}
      PARTNER_JWT_SECRET: ${PARTNER_JWT_SECRET}
      ENV: ${ENVIRONMENT:-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GCP_STORAGE_BUCKET: ${GCP_STORAGE_BUCKET:-hospyn-medical-records}
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Notification Service (FIX 2: was completely missing) ──────────────────────
  notification-service:
    build: ../notification-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://notification_user:${NOTIFICATION_DB_PASSWORD}@db:5432/hospyn_notifications
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: HS256
      ENV: ${ENVIRONMENT:-production}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SMS_TEST_MODE: "false"
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── AI Service ────────────────────────────────────────────────────────────────
  ai-service:
    build: ../ai-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_user:${AI_DB_PASSWORD}@db:5432/hospyn_ai
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENV: ${ENVIRONMENT:-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
