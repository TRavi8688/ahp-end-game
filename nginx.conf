worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone (Nginx-level protection before it hits FastAPI/Redis)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # HTTP Server: Redirect all traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        server_tokens off;

        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name localhost;

        # Hide Nginx version
        server_tokens off;

        # SSL Configuration
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Modern Security Headers (Hardened)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

        # Proxy settings and timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        # Forward headers configuration
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id; # Keep correlation ID if present

        # Authentication Service Routes
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service:8001/api/v1/auth/;
        }

        # Healthcare Core Routes
        location /api/v1/healthcare/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://healthcare_core:8002/api/v1/healthcare/;
        }

        # Health Check
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Deny access to other hidden files/folders
        location ~ /\. {
            deny all;
        }
    }
}
