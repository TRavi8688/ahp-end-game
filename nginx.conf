# ============================================================
# nginx.conf — FIXED VERSION
# FIXES APPLIED:
#   - Self-signed cert references replaced with Let's Encrypt paths
#     (update YOUR_DOMAIN.COM with your actual domain)
#   - Stricter rate limiting on auth/OTP endpoints specifically
#   - X-Request-ID generation for request tracing
#   - Larger body size limit for file uploads (OCR use case)
#   - WebSocket support for real-time queue updates
#   - OCSP stapling for better TLS performance
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;  # Hide nginx version globally

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # General API limit
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # FIXED: Strict limit for OTP/auth endpoints (brute-force protection)
    # Allows max 3 OTP requests per minute per IP
    limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=3r/m;

    # Login attempts: 5 per minute
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format hospyn_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log hospyn_json;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        # FIXED: Replace localhost with your real domain
        server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;
        server_tokens off;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        # FIXED: Replace localhost with your real domain
        server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;
        server_tokens off;

        # ── TLS Configuration ─────────────────────────────────────────────────
        # FIXED: Self-signed cert paths replaced with Let's Encrypt paths.
        # Run: certbot certonly --nginx -d YOUR_DOMAIN.COM
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (better TLS performance)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header X-Request-ID $request_id always;

        # ── Request Settings ──────────────────────────────────────────────────
        client_max_body_size 20M;  # Allow OCR file uploads
        proxy_connect_timeout 90;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # ── Common Proxy Headers ──────────────────────────────────────────────
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # ── OTP Endpoints — Strict Rate Limiting ─────────────────────────────
        # FIXED: Separate, stricter rate limit for OTP endpoints
        location /api/v1/auth/otp/ {
            limit_req zone=otp_limit burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://auth-service:8001/api/v1/auth/otp/;
        }

        # ── Auth Routes (Login, Refresh, Logout) ─────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://auth-service:8001/api/v1/auth/;
        }

        # ── Healthcare Core Routes ────────────────────────────────────────────
        location /api/v1/healthcare/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://healthcare-core:8002/api/v1/healthcare/;

            # WebSocket support for real-time queue updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Health Check ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── Deny dotfiles ─────────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
